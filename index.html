const toKey = d => {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
};
const fromKey  = k => { const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); };
const today    = () => { const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); };
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const weekStart= d => { const day=d.getDay(); return addDays(d, day===0?-6:1-day); };
const fmt      = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtFull  = d => d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtDay   = d => d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

const getPhaseForWeek = w => PHASES.find(p=>p.weeks.includes(w))||PHASES[2];
const getWeekAndDay   = (startDate, date) => {
  const days = Math.floor((date - startDate)/86400000);
  return { weekNum: Math.floor(days/7)+1, dayIndex: days%7 };
};
const getDayDef = i => (i>=0&&i<=5) ? DAYS[i] : null;

const STORAGE_PREFIX = "forgefit:";
const sGet = async k => {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + k);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
};
const sSet = async (k, v) => {
  try { localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v)); } catch {}
};

      setRides(rds);
      if (cfg) {
        setSettings(cfg);
      }
      setLoading(false);
    })();

    return React.createElement("div", { style: { minHeight: "100vh", background: C.black, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, fontFamily: "monospace" } },

                const cfg = { week: w, startDate, unit: "lbs", restTime: 90 };
                await sSet("settings:user", cfg);
                setSettings(cfg);
              },
              style: {

              }
            }, w)
          )
        ),
        React.createElement(Btn, { onClick: () => {}, color: C.push, disabled: true }, "Select a week above to continue")
      )
    );
  }

  const startDate = fromKey(settings.startDate);
  const td = today();
  const { weekNum, dayIndex } = getWeekAndDay(startDate, td);
  const phase = getPhaseForWeek(Math.min(weekNum, 12));
  const dayDef = getDayDef(dayIndex);

      React.createElement("div", { style: { fontSize: 22, fontWeight: 800, color: C.text, marginBottom: 16 } }, "Good morning, Shane.")
    ),
    React.createElement(Card, { style: { border: `1px solid ${C.border}` } },

      React.createElement("div", { style: { fontSize: 11, color: C.muted } }, `Week ${Math.min(weekNum, 12)} of 12`)
    )
  );
}
