const toKey = d => {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
};
const fromKey  = k => { const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); };
const today    = () => { const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); };
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const weekStart= d => { const day=d.getDay(); return addDays(d, day===0?-6:1-day); };
const fmt      = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtFull  = d => d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtDay   = d => d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

const getPhaseForWeek = w => PHASES.find(p=>p.weeks.includes(w))||PHASES[2];
const getWeekAndDay   = (startDate, date) => {
  const days = Math.floor((date - startDate)/86400000);
  return { weekNum: Math.floor(days/7)+1, dayIndex: days%7 };
};
const getDayDef = i => (i>=0&&i<=5) ? DAYS[i] : null;

const STORAGE_PREFIX = "forgefit:";
const sGet = async k => {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + k);
    return raw ? JSON.parse(raw) : null;
  } catch (e2) { return null; }
};
const sSet = async (k, v) => {
  try { localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v)); } catch (e3) {}
};

function SettingsModal({ settings, onSave, onClose }) {
  const [week, setWeek] = useState(()=>{
    const sd=fromKey(settings.startDate);
    const {weekNum}=getWeekAndDay(sd,today());
    return Math.min(Math.max(weekNum,1),12);
  });
  const [unit, setUnit]         = useState(settings.unit||"lbs");
  const [restTime, setRestTime] = useState(settings.restTime||90);
  const [confirmReset, setConfirmReset] = useState(false);

  const save = async () => {
    const mon       = weekStart(today());
    const startDate = toKey(addDays(mon,-(week-1)*7));
    const cfg       = {...settings,startDate,unit,restTime};
    await sSet("settings:user",cfg);
    onSave(cfg); onClose();
  };

  const handleReset = async () => {
    await sSet("settings:user",null);
    await sSet("data:sessions",{});
    await sSet("data:rides",{});
    window.location.reload();
  };

  return (
    React.createElement('div', { style: {position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",
      display:"flex",alignItems:"flex-end",zIndex:200}, onClick: onClose,}
      , React.createElement('div', { style: {background:C.carbon,borderRadius:"20px 20px 0 0",padding:"24px 20px 44px",
        width:"100%",border:`1px solid ${C.border}`,maxHeight:"85vh",overflowY:"auto"},

// ─────────────────────────────────────────────
// HOME
// ─────────────────────────────────────────────
function HomeScreen({ settings, sessions, rides, navigate, onOpenSettings }) {
  const startDate = fromKey(settings.startDate);
  const td        = today();
  const { weekNum, dayIndex } = getWeekAndDay(startDate,td);
  const phase   = getPhaseForWeek(Math.min(weekNum,12));
  const dayDef  = getDayDef(dayIndex);
  const todayKey= toKey(td);

  let streak=0;
  for(let i=1;i<=30;i++){
    const k=toKey(addDays(td,-i));
    const dd=getDayDef(getWeekAndDay(startDate,fromKey(k)).dayIndex);
    if(dd&&sessions[k]) streak++;
    else if(dd) break;
  }
  const prCount   = Object.values(sessions).reduce((a,s)=>a+(s.prs||[]).length,0);
  const weekMon   = weekStart(td);
  const weekRides = Array.from({length:7},(_,i)=>toKey(addDays(weekMon,i))).filter(k=>rides[k]).length;

  return (
    React.createElement('div', { style: {padding:"16px 16px 0",fontFamily:"system-ui,sans-serif"},}
      , React.createElement('div', { style: {display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16},}
        , React.createElement('div', null
          , React.createElement('div', { style: {fontSize:11,color:C.muted,fontFamily:"monospace",
            letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4},}, "ForgeFit")
          , React.createElement('div', { style: {fontSize:22,fontWeight:800,color:C.text},}
            , (()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening"})(), ", Shane."
          )
        )
        , React.createElement('button', { onClick: onOpenSettings, style: {background:C.steel,border:`1px solid ${C.border}`,
          borderRadius:10,padding:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},}
          , React.createElement(Icon, { name: "gear", size: 20, color: C.sub,})
        )
      )

      /* Phase banner */
      , React.createElement('div', { style: {background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",
        borderRadius:12,padding:"10px 14px",marginBottom:12},}
        , React.createElement('div', { style: {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6},}
          , React.createElement('span', { style: {fontSize:10,fontFamily:"monospace",color:C.phase,
            textTransform:"uppercase",letterSpacing:"0.12em"},}, phase.label, " — Wk "   , weekNum)
          , React.createElement('span', { style: {fontSize:11,fontWeight:700,color:C.phase},}, Math.min(weekNum,12), "/12")
        )
        , React.createElement('div', { style: {height:3,background:C.border,borderRadius:2,overflow:"hidden"},}
          , React.createElement('div', { style: {height:"100%",background:C.phase,borderRadius:2,
            width:`${((Math.min(weekNum,12)-1)/12)*100}%`,transition:"width 0.4s"},})
        )
        , React.createElement('div', { style: {fontSize:11,color:C.sub,marginTop:6,lineHeight:1.5},}
          , phase.weekFocus[(Math.min(weekNum,12)-1)%4]
        )
      )

      /* Stats */
      , React.createElement('div', { style: {display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12},}
        , [
          {val:streak,     label:"Streak",  color:C.push},
          {val:`${weekRides}/${phase.rides}`,label:"Rides",color:C.pelo},
          {val:prCount,    label:"PRs",     color:C.legs},

          React.createElement('div', { key: s.label, style: {background:C.steel,borderRadius:10,
            padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`},}

              , React.createElement('div', { style: {fontSize:12,color:C.sub},}, dayDef.exercises.length, " exercises" )

          )

// ─────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────
function App() {
  const [settings, setSettings]     = useState(null);
  const [sessions, setSessions]     = useState({});
  const [rides, setRides]           = useState({});
  const [page, setPage]             = useState("home");
  const [sessionDraft, setSessionDraft] = useState({});
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerVal, setTimerVal]     = useState(90);
  const timerRef = useRef(null);

  useEffect(()=>{
    (async ()=>{
      const cfg=await sGet("settings:user");
      if(cfg){
        setSettings(cfg);
        const sess=await sGet("data:sessions");
        const rds=await sGet("data:rides");
        if(sess) setSessions(sess);
        if(rds) setRides(rds);
      }
    })();
  },[]);

  if(!settings) return React.createElement(Onboarding, { onComplete: (cfg)=>{
    setSettings(cfg);
    sGet("data:sessions").then(s=>{if(s)setSessions(s);});
    sGet("data:rides").then(r=>{if(r)setRides(r);});
  }});

  const onSaveSession = async (key, data) => {
    const updated={...sessions,[key]:data};
    setSessions(updated);
    await sSet("data:sessions",updated);
  };

  const onSaveRide = async (key, data) => {
    const updated={...rides,[key]:data};
    setRides(updated);
    await sSet("data:rides",updated);
  };

  return (
    React.createElement('div', { style: {background:C.black,minHeight:"100vh",display:"flex",flexDirection:"column"},}
      , page==="home"?
        React.createElement(HomeScreen, {
          settings, sessions, rides,
          navigate: setPage,
          onOpenSettings: ()=>setSettingsOpen(true),
        })
        : React.createElement('div', null)

      , settingsOpen&&React.createElement(SettingsModal, {
        settings, onSave: setSettings,
        onClose: ()=>setSettingsOpen(false),
      })

      , React.createElement('div', { style: {display:"flex",gap:0,borderTop:`1px solid ${C.border}`,marginTop:"auto",padding:"8px 0 max(8px,env(safe-area-inset-bottom))"},}
        , [{id:"home",icon:"home",label:"Home"},{id:"program",icon:"program",label:"Program"},{id:"sessions",icon:"sessions",label:"Log"},{id:"progress",icon:"progress",label:"Stats"}].map(t=>(
          React.createElement('button', { key: t.id, onClick: ()=>{setPage(t.id);setSessionDraft({});},
            style: {flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",
              flexDirection:"column",alignItems:"center",gap:4,padding:"8px 0",
              color:page===t.id?C.text:C.sub,transition:"color 0.2s"},}
            , React.createElement(Icon, { name: t.icon, size: 20, color: page===t.id?C.text:C.sub,})
            , React.createElement('span', { style: {fontSize:9,fontFamily:"monospace",letterSpacing:"0.05em"},}, t.label)
          )
        ))
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
